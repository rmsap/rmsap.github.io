<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 675" role="img" preserveAspectRatio="xMidYMid meet">
  <title>Nobody Asked Me To — thumbnail</title>
  <desc>A stylized git blame output on a dark background showing a Python serializer method. One line is highlighted, showing an author commit from the start of the post author's career performing a database mutation inside a serializer. Other author names are redacted. Corner labels read serializers.py, six months in, commit author date, and nobody asked me to.</desc>

  <rect x="0" y="0" width="1200" height="675" fill="#0d1117"/>

  <text x="40" y="48" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="2">// SERIALIZERS.PY</text>
  <text x="1160" y="48" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="2" text-anchor="end">// SIX MONTHS IN</text>

  <g transform="translate(180, 160)">
    <rect x="0" y="0" width="840" height="360" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <circle cx="22" cy="22" r="6" fill="#30363d"/>
    <circle cx="42" cy="22" r="6" fill="#30363d"/>
    <circle cx="62" cy="22" r="6" fill="#30363d"/>

    <line x1="0" y1="44" x2="840" y2="44" stroke="#30363d" stroke-width="1"/>

    <text x="420" y="32" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" text-anchor="middle">git blame serializers.py</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15">

      <text x="32" y="84" fill="#484f58">a3f2b1c4</text>
      <text x="148" y="84" fill="#484f58">(</text>
      <rect x="156" y="73" width="120" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="84" fill="#484f58">2024-08-12)</text>
      <text x="424" y="84" fill="#484f58">42</text>
      <text x="476" y="84" fill="#484f58">def to_representation(self, instance):</text>

      <text x="32" y="116" fill="#484f58">9b2e44a8</text>
      <text x="148" y="116" fill="#484f58">(</text>
      <rect x="156" y="105" width="132" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="116" fill="#484f58">2024-11-03)</text>
      <text x="424" y="116" fill="#484f58">43</text>
      <text x="476" y="116" fill="#484f58">    data = super().to_representation(instance)</text>

      <text x="32" y="148" fill="#484f58">c7d8e91f</text>
      <text x="148" y="148" fill="#484f58">(</text>
      <rect x="156" y="137" width="120" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="148" fill="#484f58">2025-02-19)</text>
      <text x="424" y="148" fill="#484f58">44</text>
      <text x="476" y="148" fill="#484f58">    if instance.is_archived:</text>

      <text x="32" y="180" fill="#484f58">c7d8e91f</text>
      <text x="148" y="180" fill="#484f58">(</text>
      <rect x="156" y="169" width="120" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="180" fill="#484f58">2025-02-19)</text>
      <text x="424" y="180" fill="#484f58">45</text>
      <text x="476" y="180" fill="#484f58">        data['status'] = 'archived'</text>

      <rect x="8" y="198" width="824" height="32" rx="3" fill="#1f6feb" fill-opacity="0.15"/>
      <rect x="8" y="198" width="3" height="32" fill="#1f6feb"/>
      <text x="32" y="220" fill="#c9d1d9" font-weight="500">1105a00b</text>
      <text x="148" y="220" fill="#58a6ff" font-weight="500">(Ryan Saperstein</text>
      <text x="296" y="220" fill="#c9d1d9" font-weight="500">2025-11-05)</text>
      <text x="424" y="220" fill="#c9d1d9" font-weight="500">46</text>
      <text x="476" y="220" fill="#c9d1d9" font-weight="500">    instance.update_last_seen(timezone.now())</text>

      <text x="32" y="252" fill="#484f58">9b2e44a8</text>
      <text x="148" y="252" fill="#484f58">(</text>
      <rect x="156" y="241" width="132" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="252" fill="#484f58">2024-11-03)</text>
      <text x="424" y="252" fill="#484f58">47</text>
      <text x="476" y="252" fill="#484f58">    return data</text>

      <text x="32" y="284" fill="#484f58">a3f2b1c4</text>
      <text x="148" y="284" fill="#484f58">(</text>
      <rect x="156" y="273" width="120" height="14" rx="2" fill="#30363d"/>
      <text x="296" y="284" fill="#484f58">2024-08-12)</text>
      <text x="424" y="284" fill="#484f58">48</text>
      <text x="476" y="284" fill="#484f58"></text>
    </g>
  </g>

  <text x="40" y="640" fill="#6e7681" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="2">COMMIT · AUTHOR · DATE</text>
  <text x="1160" y="640" fill="#c9d1d9" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="2" text-anchor="end" font-weight="500">BENEFIT OF THE DOUBT</text>
</svg>
