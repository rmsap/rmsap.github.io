<svg width="100%" viewBox="0 0 960 540" role="img" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Phoenix Gen — one schema, four targets</title>
<desc>A single .phx schema (a Post struct and a createPost endpoint) flows into Phoenix Gen and produces typed code in TypeScript, Python (Pydantic/FastAPI), Go (net/http), and an OpenAPI 3.1 spec.</desc>
<style>
  .t   { font-size: 14px; fill: #2C2C2A; }
  .ts  { font-size: 12px; fill: #5F5E5A; }
  .th  { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .hdr { font-size: 12px; font-weight: 600; fill: #FAF9F4; }
  .code { font-size: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2C2C2A; white-space: pre; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }

  .panel-bg   { fill: #FFFFFF; stroke: #B4B2A9; stroke-width: 0.5; }
  .src-bar    { fill: #5F5E5A; }
  .ts-bar     { fill: #185FA5; }
  .py-bar     { fill: #9A6B11; }
  .go-bar     { fill: #0F6E56; }
  .api-bar    { fill: #534AB7; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="960" height="540" fill="#FAF9F4"/>

<!-- Schema panel -->
<rect class="panel-bg" x="240" y="20" width="480" height="208" rx="8"/>
<rect class="src-bar" x="240" y="20" width="480" height="24" rx="8"/>
<rect class="src-bar" x="240" y="36" width="480" height="8"/>
<text class="hdr" x="256" y="36" dominant-baseline="central">api.phx — schema</text>

<text class="code" x="256" y="64">struct&#160;Post&#160;{</text>
<text class="code" x="256" y="79">&#160;&#160;Int&#160;id</text>
<text class="code" x="256" y="94">&#160;&#160;String&#160;title&#160;where&#160;self.length&#160;&gt;&#160;0&#160;&amp;&amp;&#160;self.length&#160;&lt;=&#160;200</text>
<text class="code" x="256" y="109">&#160;&#160;String&#160;body&#160;&#160;where&#160;self.length&#160;&gt;&#160;0</text>
<text class="code" x="256" y="124">&#160;&#160;List&lt;String&gt;&#160;tags</text>
<text class="code" x="256" y="139">}</text>
<text class="code" x="256" y="169">endpoint&#160;createPost:&#160;POST&#160;"/api/posts"&#160;{</text>
<text class="code" x="256" y="184">&#160;&#160;body&#160;Post&#160;omit&#160;{&#160;id&#160;}</text>
<text class="code" x="256" y="199">&#160;&#160;response&#160;Post</text>
<text class="code" x="256" y="214">&#160;&#160;error&#160;{&#160;ValidationError(400),&#160;Unauthorized(401)&#160;}</text>

<!-- phoenix gen pill -->
<rect x="420" y="240" width="120" height="24" rx="12" fill="#2C2C2A"/>
<text class="hdr" x="480" y="252" text-anchor="middle" dominant-baseline="central">phoenix gen</text>

<!-- Trunk + fan-out lines -->
<path d="M 480 228 L 480 240" class="arr"/>
<path d="M 480 264 L 480 282 L 130 282 L 130 298" class="arr" marker-end="url(#arrow)"/>
<path d="M 370 282 L 370 298" class="arr" marker-end="url(#arrow)"/>
<path d="M 480 264 L 480 282 L 610 282 L 610 298" class="arr" marker-end="url(#arrow)"/>
<path d="M 480 264 L 480 282 L 850 282 L 850 298" class="arr" marker-end="url(#arrow)"/>

<!-- TypeScript panel -->
<rect class="panel-bg" x="20" y="300" width="220" height="200" rx="8"/>
<rect class="ts-bar" x="20" y="300" width="220" height="24" rx="8"/>
<rect class="ts-bar" x="20" y="316" width="220" height="8"/>
<text class="hdr" x="32" y="316" dominant-baseline="central">TypeScript · client.ts</text>

<text class="code" x="32" y="344">export&#160;interface&#160;Post&#160;{</text>
<text class="code" x="32" y="359">&#160;&#160;id:&#160;number;</text>
<text class="code" x="32" y="374">&#160;&#160;title:&#160;string;</text>
<text class="code" x="32" y="389">&#160;&#160;body:&#160;string;</text>
<text class="code" x="32" y="404">&#160;&#160;tags:&#160;string[];</text>
<text class="code" x="32" y="419">}</text>
<text class="code" x="32" y="449">export&#160;async&#160;function</text>
<text class="code" x="32" y="464">&#160;&#160;createPost(</text>
<text class="code" x="32" y="479">&#160;&#160;&#160;&#160;input:&#160;Omit&lt;Post,&#160;"id"&gt;</text>
<text class="code" x="32" y="494">&#160;&#160;):&#160;Promise&lt;Post&gt;</text>

<!-- Python panel -->
<rect class="panel-bg" x="260" y="300" width="220" height="200" rx="8"/>
<rect class="py-bar" x="260" y="300" width="220" height="24" rx="8"/>
<rect class="py-bar" x="260" y="316" width="220" height="8"/>
<text class="hdr" x="272" y="316" dominant-baseline="central">Python · models.py</text>

<text class="code" x="272" y="344">class&#160;Post(BaseModel):</text>
<text class="code" x="272" y="359">&#160;&#160;&#160;&#160;id:&#160;int</text>
<text class="code" x="272" y="374">&#160;&#160;&#160;&#160;title:&#160;str&#160;=&#160;Field(</text>
<text class="code" x="272" y="389">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;min_length=1,</text>
<text class="code" x="272" y="404">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;max_length=200)</text>
<text class="code" x="272" y="419">&#160;&#160;&#160;&#160;body:&#160;str&#160;=&#160;Field(</text>
<text class="code" x="272" y="434">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;min_length=1)</text>
<text class="code" x="272" y="449">&#160;&#160;&#160;&#160;tags:&#160;list[str]</text>
<text class="code" x="272" y="464">@app.post("/api/posts")</text>
<text class="code" x="272" y="479">async&#160;def&#160;create_post(</text>
<text class="code" x="272" y="494">&#160;&#160;&#160;&#160;body:&#160;NewPost)&#160;-&gt;&#160;Post:</text>

<!-- Go panel -->
<rect class="panel-bg" x="500" y="300" width="220" height="200" rx="8"/>
<rect class="go-bar" x="500" y="300" width="220" height="24" rx="8"/>
<rect class="go-bar" x="500" y="316" width="220" height="8"/>
<text class="hdr" x="512" y="316" dominant-baseline="central">Go · post.go</text>

<text class="code" x="512" y="344">type&#160;Post&#160;struct&#160;{</text>
<text class="code" x="512" y="359">&#160;&#160;ID&#160;&#160;&#160;&#160;int&#160;&#160;&#160;&#160;&#160;&#160;`json:"id"`</text>
<text class="code" x="512" y="374">&#160;&#160;Title&#160;string&#160;&#160;&#160;`json:"title"`</text>
<text class="code" x="512" y="389">&#160;&#160;Body&#160;&#160;string&#160;&#160;&#160;`json:"body"`</text>
<text class="code" x="512" y="404">&#160;&#160;Tags&#160;&#160;[]string&#160;`json:"tags"`</text>
<text class="code" x="512" y="419">}</text>
<text class="code" x="512" y="449">func&#160;CreatePost(</text>
<text class="code" x="512" y="464">&#160;&#160;ctx&#160;context.Context,</text>
<text class="code" x="512" y="479">&#160;&#160;in&#160;PostInput,</text>
<text class="code" x="512" y="494">)&#160;(*Post,&#160;error)</text>

<!-- OpenAPI panel -->
<rect class="panel-bg" x="740" y="300" width="220" height="200" rx="8"/>
<rect class="api-bar" x="740" y="300" width="220" height="24" rx="8"/>
<rect class="api-bar" x="740" y="316" width="220" height="8"/>
<text class="hdr" x="752" y="316" dominant-baseline="central">OpenAPI 3.1 · openapi.yaml</text>

<text class="code" x="752" y="344">paths:</text>
<text class="code" x="752" y="359">&#160;&#160;/api/posts:</text>
<text class="code" x="752" y="374">&#160;&#160;&#160;&#160;post:</text>
<text class="code" x="752" y="389">&#160;&#160;&#160;&#160;&#160;&#160;requestBody:</text>
<text class="code" x="752" y="404">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;$ref:&#160;'#/Post'</text>
<text class="code" x="752" y="419">&#160;&#160;&#160;&#160;&#160;&#160;responses:</text>
<text class="code" x="752" y="434">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;'200':</text>
<text class="code" x="752" y="449">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;$ref:&#160;'#/Post'</text>
<text class="code" x="752" y="464">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;'400':&#160;ValidationError</text>
<text class="code" x="752" y="479">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;'401':&#160;Unauthorized</text>

<text class="ts" x="480" y="524" text-anchor="middle">Field-level constraints, path params, and error variants are type-checked once and carried through every target.</text>
</svg>
