<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Push notification flow for mobile apps</title>
<desc>Five-step flow showing how push notifications travel from an app server through Apple or Google push services to a mobile device, with a registration handshake that happens first.</desc>
<style>
  .t  { font-size: 14px; fill: #2C2C2A; }
  .ts { font-size: 12px; fill: #5F5E5A; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .box { fill: #F1EFE8; stroke: #B4B2A9; }
  .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
  .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-gray .th   { fill: #2C2C2A; }  .c-gray .ts   { fill: #444441; }
  .c-blue .th   { fill: #0C447C; }  .c-blue .ts   { fill: #185FA5; }
  .c-teal .th   { fill: #085041; }  .c-teal .ts   { fill: #0F6E56; }
  .c-purple .th { fill: #3C3489; }  .c-purple .ts { fill: #534AB7; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="620" fill="#FAF9F4"/>

<text class="th" x="40" y="40">Registration (first launch)</text>

<g class="c-gray">
<rect x="40" y="60" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="82" text-anchor="middle" dominant-baseline="central">Mobile app</text>
<text class="ts" x="130" y="100" text-anchor="middle" dominant-baseline="central">Requests permission</text>
</g>

<line x1="220" y1="88" x2="260" y2="88" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="260" y="60" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="350" y="82" text-anchor="middle" dominant-baseline="central">APNs / FCM</text>
<text class="ts" x="350" y="100" text-anchor="middle" dominant-baseline="central">Issues device token</text>
</g>

<line x1="440" y1="88" x2="480" y2="88" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="480" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="82" text-anchor="middle" dominant-baseline="central">App server</text>
<text class="ts" x="560" y="100" text-anchor="middle" dominant-baseline="central">Stores token</text>
</g>

<line x1="40" y1="160" x2="640" y2="160" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

<text class="th" x="40" y="200">Sending a notification</text>

<g class="c-teal">
<rect x="40" y="230" width="200" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="140" y="255" text-anchor="middle" dominant-baseline="central">1. App server</text>
<text class="ts" x="140" y="275" text-anchor="middle" dominant-baseline="central">Event triggers send</text>
<text class="ts" x="140" y="290" text-anchor="middle" dominant-baseline="central">Payload + device token</text>
</g>

<line x1="240" y1="265" x2="300" y2="265" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="300" y="230" width="220" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="410" y="255" text-anchor="middle" dominant-baseline="central">2. Push gateway</text>
<text class="ts" x="410" y="275" text-anchor="middle" dominant-baseline="central">APNs (iOS) / FCM (Android)</text>
<text class="ts" x="410" y="290" text-anchor="middle" dominant-baseline="central">Authenticates and routes</text>
</g>

<path d="M 410 300 L 410 340 L 140 340 L 140 380" class="arr" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="420" y="332">3. Persistent connection delivers to device</text>

<g class="c-purple">
<rect x="40" y="380" width="200" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="140" y="405" text-anchor="middle" dominant-baseline="central">4. Device OS</text>
<text class="ts" x="140" y="425" text-anchor="middle" dominant-baseline="central">Receives via system</text>
<text class="ts" x="140" y="440" text-anchor="middle" dominant-baseline="central">service, not the app</text>
</g>

<line x1="240" y1="415" x2="300" y2="415" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="300" y="380" width="220" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="410" y="405" text-anchor="middle" dominant-baseline="central">5. User sees notification</text>
<text class="ts" x="410" y="425" text-anchor="middle" dominant-baseline="central">Banner, sound, badge</text>
<text class="ts" x="410" y="440" text-anchor="middle" dominant-baseline="central">Tap opens the app</text>
</g>

<rect x="40" y="490" width="600" height="100" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="56" y="515">Why a gateway in the middle?</text>
<text class="ts" x="56" y="540">Phones can't hold open TCP connections to every backend without draining the battery.</text>
<text class="ts" x="56" y="558">APNs and FCM maintain one persistent socket per device and multiplex all apps over it,</text>
<text class="ts" x="56" y="576">so notifications arrive even when your app isn't running.</text>
</svg>
