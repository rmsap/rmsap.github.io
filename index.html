<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Single theme-color, kept in sync with the active theme by the inline
         script below and the in-app toggle. -->
    <meta name="theme-color" content="#0f141c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryan Saperstein</title>
    <!-- Editorial type: self-hosted Fraunces (display) + Inter (body). @font-face
         lives in src/index.css; preload the above-the-fold normal faces so text
         paints without the old cross-origin Google Fonts round-trip. crossorigin
         is required on font preloads (fonts fetch in CORS mode) to avoid a
         double download. -->
    <link
      rel="preload"
      href="/fonts/fraunces-variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter-variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Static OG/Twitter tags for the homepage. Crawlers don't execute JS,
         so react-helmet-async additions won't reach them — these have to live
         in the served HTML. Per-page tags and rendered body content are
         injected by scripts/prerender.ts on top of this shell. -->
    <meta
      name="description"
      content="Software Developer at Playbook Sports, building an all-in-one app for youth sports leagues. On the side, building Phoenix, a programming language written from scratch in Rust. Northeastern grad, previously at the Broad Institute and VMware."
    />
    <link rel="canonical" href="https://ryansaperstein.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ryan Saperstein" />
    <meta property="og:title" content="Ryan Saperstein" />
    <meta
      property="og:description"
      content="Software Developer at Playbook Sports, building an all-in-one app for youth sports leagues. On the side, building Phoenix, a programming language written from scratch in Rust. Northeastern grad, previously at the Broad Institute and VMware."
    />
    <meta property="og:url" content="https://ryansaperstein.com/" />
    <meta property="og:image" content="https://ryansaperstein.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Ryan Saperstein, software engineer building Phoenix, a programming language in Rust"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ryan Saperstein" />
    <meta
      name="twitter:description"
      content="Software Developer at Playbook Sports, building an all-in-one app for youth sports leagues. On the side, building Phoenix, a programming language written from scratch in Rust. Northeastern grad, previously at the Broad Institute and VMware."
    />
    <meta name="twitter:image" content="https://ryansaperstein.com/og.png" />
    <meta
      name="twitter:image:alt"
      content="Ryan Saperstein, software engineer building Phoenix, a programming language in Rust"
    />
    <!-- Structured data: identifies the person + site to search engines and
         links the identity across profiles via sameAs (helps rank for the name
         and enables a knowledge panel). Static so crawlers see it on every page. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "name": "Ryan Saperstein",
            "url": "https://ryansaperstein.com",
            "image": "https://ryansaperstein.com/ryanPhoto.jpg",
            "jobTitle": "Software Engineer",
            "worksFor": { "@type": "Organization", "name": "Playbook Sports" },
            "alumniOf": {
              "@type": "CollegeOrUniversity",
              "name": "Northeastern University"
            },
            "sameAs": [
              "https://github.com/rmsap",
              "https://www.linkedin.com/in/ryansaperstein"
            ]
          },
          {
            "@type": "WebSite",
            "name": "Ryan Saperstein",
            "url": "https://ryansaperstein.com"
          }
        ]
      }
    </script>
    <!-- Static (not Helmet) so feed discovery finds it in <head> on every
         prerendered page; scripts/prerender.ts preserves it when swapping
         page-specific meta. -->
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Ryan Saperstein's Blog"
      href="/rss.xml"
    />
    <!-- Must run before React mounts; see public/spa-redirect.js.
         Served verbatim from public/ — do not move under src/ or Vite will rewrite the path. -->
    <script src="/spa-redirect.js"></script>
    <!-- Apply the saved (or OS-preferred) color theme before first paint so
         there's no flash of the wrong theme. The toggle persists "theme". -->
    <script>
      (function () {
        try {
          var t =
            localStorage.getItem("theme") ||
            (matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m)
            m.setAttribute("content", t === "light" ? "#f2f5f9" : "#0f141c");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
